
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Management System</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
nav.top{display:flex;justify-content:space-between;padding:20px 60px}
.menu{border:1px solid #aaa;border-radius:8px;display:flex;overflow:hidden}
.menu a{padding:10px 25px;text-decoration:none;color:black;border-right:1px solid #ccc}
.menu a:last-child{border-right:none}
.hero{height:80vh;display:flex;align-items:center;justify-content:center;font-size:42px;letter-spacing:2px}
.btn{background:black;color:white;padding:10px 18px;border-radius:6px;text-decoration:none;margin-left:10px}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:white;padding:35px;border-radius:10px;width:350px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.card input,.card select{width:100%;padding:10px;margin-top:8px;margin-bottom:15px;border:1px solid #ccc;border-radius:6px}
.primary{background:#18d318;color:white;padding:12px;border:none;border-radius:8px;width:100%;font-weight:bold}
.layout{display:flex;min-height:100vh}
.sidebar{width:230px;background:#eee;padding:25px}
.sidebar h2{color:#0a8f0a}
.sidebar a{display:block;margin:12px 0;text-decoration:none;color:#333}
.content{flex:1;padding:40px}
.tax-card{background:white;padding:15px;margin-bottom:10px;border-radius:8px;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
